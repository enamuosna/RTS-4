# ===============================================================
#  RTS Caisse - Gateway nginx (reverse proxy unifie)
#  Une seule porte d'entree publique pour DEUX clients :
#
#  1. Client leger Angular (navigateur)
#     - Charge l'app SPA depuis /
#     - Appelle l'API via /api/* (meme origine, pas de CORS)
#
#  2. Client lourd JavaFX (poste guichet sur LAN entreprise)
#     - Test de connexion : GET /actuator/health
#       (le client utilise Config.getServerBaseUrl() qui retire /api)
#     - Appels metier   : GET/POST /api/auth/login, /api/operations, ...
#     - Downloads       : /api/recus/{id}/pdf, /api/exports/*.xlsx
#
#  Routes finales :
#    /api/*           -> backend Spring Boot
#    /actuator/...    -> backend (health, info, metrics)
#    /health          -> alias court de /actuator/health (pratique)
#    /swagger-ui/*    -> backend (doc API)
#    /v3/api-docs/*   -> backend (OpenAPI JSON)
#    /                -> frontend Angular (fallback)
# ===============================================================

# -----------------------------------------------------------------
#  Upstreams avec keepalive (reduit la latence sur appels frequents)
# -----------------------------------------------------------------
upstream rts_backend {
    server backend:9090;
    keepalive 32;
}

upstream rts_frontend {
    server frontend:80;
    keepalive 16;
}

# -----------------------------------------------------------------
#  Map "Connection" upstream :
#    - WebSocket / Upgrade  -> "upgrade"
#    - Requete HTTP normale -> ""  (vide => preserve le keepalive !)
#
#  ATTENTION : NE PAS mettre "close" ici, sinon le keepalive declare
#  sur les upstreams ci-dessus est neutralise sur chaque requete et
#  on perd la perf. C'est aussi une cause possible des HTTP 501 vus
#  cote client lorsque l'upstream voit un Connection mal forme.
# -----------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# -----------------------------------------------------------------
#  Filtre des access logs : on ne logge PAS les health checks
#  (le client lourd polle souvent toutes les X secondes)
# -----------------------------------------------------------------
map $request_uri $loggable {
    ~^/actuator/health 0;
    ~^/health$         0;
    default            1;
}

server {
    listen 80;
    server_name _;
    server_tokens off;

    access_log /var/log/nginx/access.log combined if=$loggable;
    error_log  /var/log/nginx/error.log warn;

    # -----------------------------------------------------------
    #  Limites & timeouts
    # -----------------------------------------------------------
    # Uploads possibles : images produits, recus scannes...
    client_max_body_size      20m;
    client_body_buffer_size   256k;
    client_body_timeout       60s;
    client_header_timeout     30s;

    # Timeouts confortables pour les exports (PDF, Excel) qui peuvent
    # prendre plusieurs minutes sur de gros volumes.
    proxy_connect_timeout 10s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
    send_timeout          300s;

    # -----------------------------------------------------------
    #  Headers de securite (a renforcer derriere HTTPS)
    # -----------------------------------------------------------
    add_header X-Frame-Options        "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ===========================================================
    #  /api/* - cœur applicatif (Angular + JavaFX)
    #
    #  Modificateur "^~" : si ce prefixe match, nginx N'EVALUE PAS
    #  les regex suivantes. Plus rapide et evite tout conflit avec
    #  d'autres location regex declarees plus loin.
    # ===========================================================
    location ^~ /api/ {
        proxy_pass http://rts_backend;

        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Streaming direct pour les telechargements binaires
        # (PDF de recus, exports Excel, impression thermique...)
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_redirect          off;
    }

    # ===========================================================
    #  /actuator et /actuator/...  - sondes Spring Boot
    #
    #  Le client lourd JavaFX appelle GET /actuator/health pour son
    #  test de connexion (Config.getServerBaseUrl() + "/actuator/health").
    #  La regex matche AVEC ou SANS slash final.
    # ===========================================================
    location ~ ^/actuator(/.*)?$ {
        proxy_pass http://rts_backend;

        proxy_http_version 1.1;
        # IMPORTANT : Connection "" (vide) pour preserver le keepalive
        # de l'upstream et eviter les 501 sur certains clients HTTP/2.
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pas de bufferisation : la reponse JSON est minuscule, on
        # veut la latence minimale pour le test de connexion.
        proxy_buffering off;
    }

    # ===========================================================
    #  /health - alias court (pratique pour curl, monitoring,
    #  uptime checks externes type UptimeRobot)
    # ===========================================================
    location = /health {
        proxy_pass http://rts_backend/actuator/health;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host       $host;

        proxy_buffering off;
        access_log off;
    }

    # ===========================================================
    #  Documentation API (Swagger / OpenAPI)
    # ===========================================================
    location ~ ^/(swagger-ui|v3/api-docs) {
        proxy_pass http://rts_backend;

        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===========================================================
    #  /  -  Frontend Angular (FALLBACK)
    #
    #  DOIT etre le dernier bloc, c'est ce qui sert l'app web.
    #  Le SPA fallback (toutes routes -> index.html) est gere a
    #  l'INTERIEUR du conteneur frontend (frontend/nginx.conf).
    # ===========================================================
    location / {
        proxy_pass http://rts_frontend;

        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # ===========================================================
    #  Pages d'erreur JSON quand le backend est injoignable
    #
    #  Sans ca, nginx renvoie une page HTML que le client lourd
    #  ne peut pas parser proprement. Avec un JSON propre, le client
    #  affiche un message d'erreur lisible "Service indisponible".
    #
    #  502 : connexion refusee / DNS upstream impossible
    #  504 : timeout (backend trop lent a repondre)
    # ===========================================================
    error_page 502 504 @backend_down;

    location @backend_down {
        internal;
        default_type application/json;
        add_header Content-Type "application/json; charset=utf-8" always;
        return 503 '{"status":"DOWN","timestamp":"$time_iso8601","message":"Service temporairement indisponible. Reessayez dans quelques instants."}';
    }
}
