# =============================================================
#  RTS Caisse - docker-compose PRODUCTION
# =============================================================
#  Utilise les images publiees sur Docker Hub. AUCUN code source
#  n'est necessaire sur le serveur cible.
#
#  Deploiement sur un nouveau serveur :
#    1. Installer Docker
#    2. mkdir rts-caisse && cd rts-caisse
#    3. Copier ce fichier et le .env (avec POSTGRES_PASSWORD + JWT_SECRET)
#    4. docker compose -f docker-compose.prod.yml up -d
#
#  Mise a jour applicative :
#    docker compose -f docker-compose.prod.yml pull
#    docker compose -f docker-compose.prod.yml up -d
# =============================================================

name: rts-caisse

services:

  postgres:
    image: postgres:16-alpine
    container_name: rts-caisse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-rts_caisse_db}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?ERREUR - definir POSTGRES_PASSWORD dans .env}
      TZ: Africa/Dakar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rts-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rts_user} -d ${POSTGRES_DB:-rts_caisse_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    image: ${DOCKER_REGISTRY:-vnsu}/rts-caisse-backend:${APP_VERSION:-latest}
    container_name: rts-caisse-backend
    restart: unless-stopped
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_DB:       ${POSTGRES_DB:-rts_caisse_db}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET:        ${JWT_SECRET:?ERREUR - definir JWT_SECRET dans .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8090}
      TZ: Africa/Dakar
    networks:
      - rts-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    image: ${DOCKER_REGISTRY:-vnsu}/rts-caisse-frontend:${APP_VERSION:-latest}
    container_name: rts-caisse-frontend
    restart: unless-stopped
    pull_policy: always
    environment:
      TZ: Africa/Dakar
    networks:
      - rts-internal

  gateway:
    image: ${DOCKER_REGISTRY:-vnsu}/rts-caisse-gateway:${APP_VERSION:-latest}
    container_name: rts-caisse-gateway
    restart: unless-stopped
    pull_policy: always
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "${GATEWAY_PORT:-8090}:80"
    environment:
      TZ: Africa/Dakar
    networks:
      - rts-internal

volumes:
  postgres_data:
    name: rts-caisse-postgres-data

networks:
  rts-internal:
    name: rts-caisse-network
    driver: bridge
