# =============================================================
#  Profil "docker" — surcharge de application.properties
#  Activé via SPRING_PROFILES_ACTIVE=docker (dans docker-compose.yml)
# =============================================================

# La datasource pointe sur le service docker-compose "postgres",
# pas sur localhost comme en dev.
spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:rts_caisse_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:amc2622amc}

# Flyway applique les migrations au démarrage
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate

# Logs JSON friendly pour agrégation (ELK, Loki...) si besoin
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# CORS : l'origine visible pour le navigateur est celle du reverse
# proxy nginx (port 80 par défaut, ou celui défini dans .env)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:80}
