# ==========================================================
#  RTS CAISSE - Configuration Backend
# ==========================================================

spring.application.name=rts-caisse-backend
server.port=9090
server.servlet.context-path=/

# ---------- Base de données PostgreSQL ----------
spring.datasource.url=jdbc:postgresql://localhost:5432/rts_caisse_db
spring.datasource.username=postgres
spring.datasource.password=amc2622amc
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------- JPA / Hibernate ----------
# Le schéma est désormais géré par Flyway : Hibernate ne fait plus que
# VALIDER que les entités Java correspondent aux tables existantes.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---------- Flyway ----------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# baseline-on-migrate=true permet de gérer les bases déjà peuplées (ex : issue
# de l'ancien mode ddl-auto=update) : Flyway pose une baseline au lieu de tout rejouer.

# ---------- Jackson ----------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Africa/Dakar

# ---------- Sécurité JWT ----------
app.jwt.secret=${JWT_SECRET:Y2xlLXNlY3JldGUtcnRzLWNhaXNzZS1zZW5lZ2FsLTIwMjYtYS1yZW1wbGFjZXItZW4tcHJvZHVjdGlvbi0xMjM0NTY3ODkw}
app.jwt.expiration-ms=86400000
app.jwt.issuer=RTS-Caisse

# ---------- Upload ----------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---------- Logging ----------
logging.level.root=INFO
logging.level.sn.rts.caisse=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# ---------- OpenAPI / Swagger ----------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ---------- CORS ----------
app.cors.allowed-origins=http://localhost:4200,http://localhost:8081
